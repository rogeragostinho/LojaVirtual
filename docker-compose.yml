services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexa_store
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - nexa_network

  nginx:
    image: nginx:alpine
    container_name: nexa_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - nexa_network

  db:
    image: mysql:8.0
    container_name: nexa_db
    environment:
      MYSQL_DATABASE: nexa_store
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: nexa
      MYSQL_PASSWORD: nexa
    ports:
      - "3306:3306"
    volumes:
      - nexa_db_data:/var/lib/mysql
    networks:
      - nexa_network

  node:
    image: node:20-alpine
    container_name: nexa_node
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: sh -c "npm install && npm run build"
    networks:
      - nexa_network

volumes:
  nexa_db_data:

networks:
  nexa_network: